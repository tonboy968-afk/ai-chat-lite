<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LM Studio Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --chat-bg: #ffffff;
            --user-msg-bg: #2563eb;
            --user-msg-color: #ffffff;
            --assistant-msg-bg: #f1f5f9;
            --assistant-msg-color: #1e293b;
            --border-color: #e2e8f0;
            --text-color: #334155;
            --text-secondary: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            padding: 16px 20px;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header .api-status {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background-color: var(--user-msg-bg);
            color: var(--user-msg-color);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background-color: var(--assistant-msg-bg);
            color: var(--assistant-msg-color);
            border-bottom-left-radius: 4px;
        }

        .message-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            padding: 0 4px;
        }

        .typing-indicator {
            display: inline-block;
        }

        .typing-indicator::after {
            content: '▋';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .input-container {
            padding: 16px 20px;
            background-color: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            min-height: 48px;
            max-height: 150px;
        }

        .input-wrapper textarea:focus {
            border-color: var(--primary-color);
        }

        .input-wrapper button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        .input-wrapper button:hover {
            background-color: var(--primary-hover);
        }

        .input-wrapper button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .welcome-message {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
        }

        .welcome-message h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .welcome-message p {
            font-size: 0.95rem;
        }

        .settings-panel {
            padding: 16px 20px;
            background-color: #f1f5f9;
            border-bottom: 1px solid var(--border-color);
            display: none;
            max-height: 70vh;
            overflow-y: auto;
        }

        .settings-panel.active {
            display: block;
        }

        .settings-section {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .settings-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .settings-section h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-color);
        }

        .settings-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .settings-row:last-child {
            margin-bottom: 0;
        }

        .settings-row label {
            font-size: 0.875rem;
            font-weight: 500;
            min-width: 80px;
        }

        .settings-row input,
        .settings-row select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.875rem;
        }

        .settings-row input:focus,
        .settings-row select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .settings-row textarea {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.875rem;
            min-height: 80px;
            resize: vertical;
            font-family: inherit;
        }

        .settings-row textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .settings-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .settings-actions button {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
        }

        .settings-actions .save-btn {
            background-color: var(--primary-color);
            color: white;
        }

        .settings-actions .cancel-btn {
            background-color: #e2e8f0;
            color: var(--text-color);
        }

        .settings-actions .clear-btn {
            background-color: #ef4444;
            color: white;
        }

        .toolbar {
            display: flex;
            gap: 8px;
        }

        .toolbar button {
            padding: 8px 12px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .toolbar button:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .role-bar {
            padding: 10px 20px;
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .role-bar label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .role-bar select {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.875rem;
            background-color: white;
        }

        .role-bar select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .role-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .role-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-top: 8px;
        }

        .role-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            background-color: white;
        }

        .role-item:last-child {
            border-bottom: none;
        }

        .role-item:hover {
            background-color: #f8fafc;
        }

        .role-item-info {
            flex: 1;
            min-width: 0;
        }

        .role-item-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .role-item-prompt {
            font-size: 0.8rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .role-item-actions {
            display: flex;
            gap: 6px;
        }

        .role-item-actions button {
            padding: 4px 10px;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: white;
            cursor: pointer;
        }

        .role-item-actions button:hover {
            background-color: #f1f5f9;
        }

        .role-item-actions button.delete-btn {
            color: #ef4444;
            border-color: #ef4444;
        }

        .role-item-actions button.delete-btn:hover {
            background-color: #ef4444;
            color: white;
        }

        .role-item-actions button.active-btn {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                height: 100dvh;
            }

            .header {
                padding: 12px 16px;
            }

            .header h1 {
                font-size: 1.1rem;
            }

            .chat-container {
                padding: 16px;
            }

            .message-content {
                max-width: 85%;
                padding: 10px 14px;
            }

            .input-container {
                padding: 12px 16px;
            }

            .input-wrapper textarea {
                padding: 10px 14px;
                font-size: 16px;
            }

            .input-wrapper button {
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            .role-bar {
                padding: 8px 16px;
                flex-wrap: wrap;
            }

            .role-info {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }

            .toolbar {
                width: 100%;
                justify-content: center;
            }

            .message-content {
                max-width: 90%;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .input-wrapper button {
                width: 100%;
            }
        }

        .scroll-to-bottom {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 40px;
            height: 40px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .scroll-to-bottom.visible {
            display: flex;
        }

        @media (max-width: 480px) {
            .scroll-to-bottom {
                right: 16px;
                bottom: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>LM Studio Chat</h1>
                <span class="api-status" id="apiStatus">API: http://192.168.10.8:1234</span>
            </div>
            <div class="toolbar">
                <button onclick="toggleSettings()">设置</button>
                <button onclick="clearChat()">清空对话</button>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-section">
                <h3>LM Studio 配置</h3>
                <div class="settings-row">
                    <label>API地址:</label>
                    <input type="text" id="apiUrl" value="http://192.168.10.8:1234" placeholder="LM Studio API地址">
                </div>
                <div class="settings-row">
                    <label>模型:</label>
                    <input type="text" id="modelName" value="" placeholder="留空使用默认模型">
                </div>
            </div>

            <div class="settings-section">
                <h3>角色管理</h3>
                <div class="settings-row">
                    <label>当前角色:</label>
                    <select id="roleSelect" onchange="switchRole()"></select>
                </div>
                <div class="settings-row">
                    <label>角色名称:</label>
                    <input type="text" id="roleName" placeholder="输入角色名称">
                </div>
                <div class="settings-row">
                    <label>系统提示词:</label>
                    <textarea id="rolePrompt" placeholder="输入系统提示词，定义AI的角色和行为"></textarea>
                </div>
                <div class="settings-actions">
                    <button class="save-btn" onclick="saveRole()">保存角色</button>
                    <button class="cancel-btn" onclick="resetRoleForm()">重置</button>
                </div>
                <div class="role-list" id="roleList"></div>
            </div>

            <div class="settings-section">
                <h3>数据管理</h3>
                <div class="settings-actions">
                    <button class="save-btn" onclick="saveSettings()">保存设置</button>
                    <button class="cancel-btn" onclick="toggleSettings()">取消</button>
                    <button class="clear-btn" onclick="clearAllData()">清除所有数据</button>
                </div>
            </div>
        </div>

        <div class="role-bar">
            <label>角色:</label>
            <select id="currentRoleSelect" onchange="quickSwitchRole()"></select>
            <span class="role-info" id="roleHint"></span>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-message" id="welcomeMessage">
                <h2>欢迎使用 LM Studio Chat</h2>
                <p>输入消息开始与AI对话</p>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    placeholder="输入消息..." 
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button id="sendButton" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <button class="scroll-to-bottom" id="scrollToBottom" onclick="scrollToBottom()">↓</button>

    <script>
        const PRESET_ROLES = [
            {
                id: 'default',
                name: '通用助手',
                prompt: '你是一个有帮助的AI助手。',
                isPreset: true
            },
            {
                id: 'translator',
                name: '翻译助手',
                prompt: '你是一个专业的翻译助手。请将用户的输入翻译成目标语言。如果用户没有指定目标语言，请翻译成中文。保持原文的语气和风格。',
                isPreset: true
            },
            {
                id: 'coder',
                name: '代码助手',
                prompt: '你是一个专业的编程助手。请帮助用户解决编程问题，提供清晰的代码示例和详细的解释。使用最佳实践和设计模式。',
                isPreset: true
            },
            {
                id: 'writer',
                name: '创意写作',
                prompt: '你是一个创意写作助手。请帮助用户进行创意写作，提供生动的描述、有趣的故事和富有想象力的内容。',
                isPreset: true
            },
            {
                id: 'teacher',
                name: '学习导师',
                prompt: '你是一个耐心的学习导师。请用简单易懂的方式解释复杂的概念，提供具体的例子，帮助学生深入理解。',
                isPreset: true
            },
            {
                id: 'analyst',
                name: '数据分析师',
                prompt: '你是一个专业的数据分析师。请帮助用户分析数据，提供见解和建议。使用数据驱动的方法来解决问题。',
                isPreset: true
            },
            {
                id: 'assistant',
                name: '生活助手',
                prompt: '你是一个友好的生活助手。请帮助用户解决日常生活中的问题，提供建议和指导。保持亲切和耐心。',
                isPreset: true
            }
        ];

        let messages = [];
        let isGenerating = false;
        let currentController = null;
        let currentRoleId = 'default';
        let customRoles = [];

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const scrollToBottomBtn = document.getElementById('scrollToBottom');
        const settingsPanel = document.getElementById('settingsPanel');

        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem('lmstudio-chat-settings') || '{}');
            document.getElementById('apiUrl').value = settings.apiUrl || 'http://192.168.10.8:1234';
            document.getElementById('modelName').value = settings.modelName || '';
            document.getElementById('apiStatus').textContent = 'API: ' + (settings.apiUrl || 'http://192.168.10.8:1234');
            
            customRoles = JSON.parse(localStorage.getItem('lmstudio-chat-roles') || '[]');
            currentRoleId = localStorage.getItem('lmstudio-chat-current-role') || 'default';
            
            updateRoleSelects();
            renderRoleList();
        }

        function saveSettings() {
            const settings = {
                apiUrl: document.getElementById('apiUrl').value.replace(/\/$/, ''),
                modelName: document.getElementById('modelName').value
            };
            localStorage.setItem('lmstudio-chat-settings', JSON.stringify(settings));
            document.getElementById('apiStatus').textContent = 'API: ' + settings.apiUrl;
            toggleSettings();
        }

        function toggleSettings() {
            settingsPanel.classList.toggle('active');
        }

        function getAllRoles() {
            return [...PRESET_ROLES, ...customRoles];
        }

        function getCurrentRole() {
            return getAllRoles().find(r => r.id === currentRoleId) || PRESET_ROLES[0];
        }

        function updateRoleSelects() {
            const allRoles = getAllRoles();
            const selectHtml = allRoles.map(role => 
                `<option value="${role.id}" ${role.id === currentRoleId ? 'selected' : ''}>${role.name}${role.isPreset ? ' (预设)' : ''}</option>`
            ).join('');
            
            document.getElementById('currentRoleSelect').innerHTML = selectHtml;
            document.getElementById('roleSelect').innerHTML = selectHtml;
            
            updateRoleHint();
        }

        function updateRoleHint() {
            const role = getCurrentRole();
            const hint = document.getElementById('roleHint');
            hint.textContent = role.prompt.substring(0, 50) + (role.prompt.length > 50 ? '...' : '');
            hint.title = role.prompt;
        }

        function quickSwitchRole() {
            currentRoleId = document.getElementById('currentRoleSelect').value;
            localStorage.setItem('lmstudio-chat-current-role', currentRoleId);
            document.getElementById('roleSelect').value = currentRoleId;
            updateRoleHint();
        }

        function switchRole() {
            const roleId = document.getElementById('roleSelect').value;
            currentRoleId = roleId;
            localStorage.setItem('lmstudio-chat-current-role', currentRoleId);
            document.getElementById('currentRoleSelect').value = roleId;
            updateRoleHint();
            
            const role = getCurrentRole();
            document.getElementById('roleName').value = role.name;
            document.getElementById('rolePrompt').value = role.prompt;
        }

        function saveRole() {
            const name = document.getElementById('roleName').value.trim();
            const prompt = document.getElementById('rolePrompt').value.trim();
            
            if (!name || !prompt) {
                alert('请输入角色名称和系统提示词');
                return;
            }

            const existingIndex = customRoles.findIndex(r => r.id === currentRoleId);
            const isPreset = PRESET_ROLES.some(r => r.id === currentRoleId);
            
            if (isPreset) {
                const newRole = {
                    id: 'custom_' + Date.now(),
                    name: name,
                    prompt: prompt,
                    isPreset: false
                };
                customRoles.push(newRole);
                currentRoleId = newRole.id;
            } else if (existingIndex >= 0) {
                customRoles[existingIndex].name = name;
                customRoles[existingIndex].prompt = prompt;
            } else {
                const newRole = {
                    id: 'custom_' + Date.now(),
                    name: name,
                    prompt: prompt,
                    isPreset: false
                };
                customRoles.push(newRole);
                currentRoleId = newRole.id;
            }

            localStorage.setItem('lmstudio-chat-roles', JSON.stringify(customRoles));
            localStorage.setItem('lmstudio-chat-current-role', currentRoleId);
            
            updateRoleSelects();
            renderRoleList();
            resetRoleForm();
        }

        function deleteRole(roleId) {
            if (!confirm('确定要删除这个角色吗？')) return;
            
            customRoles = customRoles.filter(r => r.id !== roleId);
            localStorage.setItem('lmstudio-chat-roles', JSON.stringify(customRoles));
            
            if (currentRoleId === roleId) {
                currentRoleId = 'default';
                localStorage.setItem('lmstudio-chat-current-role', currentRoleId);
            }
            
            updateRoleSelects();
            renderRoleList();
            resetRoleForm();
        }

        function editRole(roleId) {
            const role = getAllRoles().find(r => r.id === roleId);
            if (!role) return;
            
            currentRoleId = roleId;
            document.getElementById('roleName').value = role.name;
            document.getElementById('rolePrompt').value = role.prompt;
            document.getElementById('roleSelect').value = roleId;
        }

        function resetRoleForm() {
            const role = getCurrentRole();
            document.getElementById('roleName').value = role.name;
            document.getElementById('rolePrompt').value = role.prompt;
            document.getElementById('roleSelect').value = currentRoleId;
        }

        function renderRoleList() {
            const roleList = document.getElementById('roleList');
            const allRoles = getAllRoles();
            
            roleList.innerHTML = allRoles.map(role => `
                <div class="role-item">
                    <div class="role-item-info">
                        <div class="role-item-name">${escapeHtml(role.name)}${role.isPreset ? ' (预设)' : ''}</div>
                        <div class="role-item-prompt">${escapeHtml(role.prompt)}</div>
                    </div>
                    <div class="role-item-actions">
                        <button onclick="editRole('${role.id}')" ${role.id === currentRoleId ? 'class="active-btn"' : ''}>编辑</button>
                        ${!role.isPreset ? `<button class="delete-btn" onclick="deleteRole('${role.id}')">删除</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function loadMessages() {
            const saved = localStorage.getItem('lmstudio-chat-messages');
            if (saved) {
                messages = JSON.parse(saved);
                renderMessages();
            }
        }

        function saveMessages() {
            localStorage.setItem('lmstudio-chat-messages', JSON.stringify(messages));
        }

        function clearChat() {
            if (messages.length === 0) return;
            if (confirm('确定要清空所有对话记录吗？')) {
                messages = [];
                saveMessages();
                renderMessages();
            }
        }

        function clearAllData() {
            if (confirm('确定要清除所有数据（包括设置、角色和对话记录）吗？')) {
                localStorage.removeItem('lmstudio-chat-settings');
                localStorage.removeItem('lmstudio-chat-messages');
                localStorage.removeItem('lmstudio-chat-roles');
                localStorage.removeItem('lmstudio-chat-current-role');
                loadSettings();
                messages = [];
                renderMessages();
                toggleSettings();
            }
        }

        function renderMessages() {
            chatContainer.innerHTML = '';
            
            if (messages.length === 0) {
                const role = getCurrentRole();
                chatContainer.innerHTML = `
                    <div class="welcome-message">
                        <h2>欢迎使用 LM Studio Chat</h2>
                        <p>当前角色: ${escapeHtml(role.name)}</p>
                        <p>输入消息开始与AI对话</p>
                    </div>
                `;
                return;
            }

            messages.forEach((msg, index) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role}`;
                messageDiv.innerHTML = `
                    <div class="message-label">${msg.role === 'user' ? '你' : 'AI'}</div>
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                `;
                chatContainer.appendChild(messageDiv);
            });

            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        chatContainer.addEventListener('scroll', () => {
            const isNearBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight < 100;
            scrollToBottomBtn.classList.toggle('visible', !isNearBottom);
        });

        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content || isGenerating) return;

            const settings = JSON.parse(localStorage.getItem('lmstudio-chat-settings') || '{}');
            const apiUrl = settings.apiUrl || 'http://192.168.10.8:1234';
            const modelName = settings.modelName || '';
            const role = getCurrentRole();

            messages.push({ role: 'user', content: content });
            saveMessages();
            renderMessages();

            messageInput.value = '';
            messageInput.style.height = 'auto';

            isGenerating = true;
            sendButton.disabled = true;

            const assistantMessage = { role: 'assistant', content: '' };
            messages.push(assistantMessage);

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.innerHTML = `
                <div class="message-label">AI</div>
                <div class="message-content"><span class="typing-indicator"></span></div>
            `;
            chatContainer.appendChild(messageDiv);

            const contentDiv = messageDiv.querySelector('.message-content');

            try {
                currentController = new AbortController();

                const apiMessages = [];
                
                if (role.prompt) {
                    apiMessages.push({ role: 'system', content: role.prompt });
                }
                
                apiMessages.push(...messages.slice(0, -1).map(m => ({
                    role: m.role,
                    content: m.content
                })));

                const requestBody = {
                    messages: apiMessages,
                    stream: true
                };

                if (modelName) {
                    requestBody.model = modelName;
                }

                const response = await fetch(`${apiUrl}/v1/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody),
                    signal: currentController.signal
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;

                            try {
                                const parsed = JSON.parse(data);
                                const delta = parsed.choices[0]?.delta?.content;
                                if (delta) {
                                    assistantMessage.content += delta;
                                    contentDiv.textContent = assistantMessage.content;
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }

                saveMessages();
            } catch (error) {
                if (error.name === 'AbortError') {
                    contentDiv.textContent = assistantMessage.content || '(已取消)';
                } else {
                    console.error('Error:', error);
                    contentDiv.textContent = `错误: ${error.message}`;
                    messages.pop();
                }
            } finally {
                isGenerating = false;
                sendButton.disabled = false;
                currentController = null;
                saveMessages();
            }
        }

        loadSettings();
        loadMessages();
        resetRoleForm();
    </script>
</body>
</html>
